name: Update Scholar Citations

on:
  schedule:
    - cron: "17 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update citation data
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SCHOLAR_AUTHOR_ID: Q4DnRVgAAAAJ
        run: python scripts/update_scholar_citations.py --soft-fail

      - name: Commit updated citation data
        run: |
          if git diff --quiet -- docs/data/scholar_citations.json; then
            echo "Citation data is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/scholar_citations.json
          git commit -m "Update Scholar citation data"
          git push
